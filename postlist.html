const allPosts = [
            { id: 2, date: "Fri Jul 17", sortDate: new Date(2026, 6, 17), type: "personal", nd: 'public', text: "Hi friends and neighbors — I recently launched my official campaign for Florida House District 75!\n\nI've created an official community group where I'll be posting updates, events, and ways you can get involved. Join us there and invite a neighbor who cares about our community.\n\nLet's do this together. 💙", ndText: "Hi neighbors! I'm Cynthia Butler — a retired nurse right here in our community — and I recently launched my official campaign for Florida House District 75.\n\nI've started a Nextdoor group where I'll be sharing updates, local events, and ways to get involved. Join us here: https://nextdoor.com/g/v8uk5mvtx/?is=groups_section_rhr\n\nWhat's the one issue you wish your state representative would actually do something about? ⬇️", instr: "BEFORE POSTING — make FB profile public: (1) Open FB app → tap ☰ menu (bottom-right on phone, top-right on desktop). (2) Settings & Privacy → Settings. (3) Under 'Audience and visibility' → tap 'Posts'. (4) 'Who can see your future posts?' → select PUBLIC. (5) Back one screen → tap 'Public posts' → set 'Public post comments' to Public. Done — every post from now on defaults to Public.", tip: "LAUNCH" },
            { id: 3, date: "Fri Jul 17", sortDate: new Date(2026, 6, 17), type: "group", nd: 'group', text: "Welcome to Neighbors for Cynthia Butler! I'll post updates, events, and questions here. Know a neighbor who cares about healthcare or accountability? Invite them in.\n\nDrop a 👋 below and tell us what neighborhood you're from — let's see how much of District 75 we've got here!", ndText: "Hi neighbors! I'm Cynthia Butler — a retired nurse running for Florida House District 75.\n\nI've just launched my campaign and I want to hear from the people in this district. What neighborhood are you from, and what matters most to your family right now?\n\nDrop it below — I read every reply. 👋", instr: "Immediately after posting, tag 5–10 core supporters in the comments and ask each of them to invite one…", tip: "GROWTH" },
            { id: 4, date: "Sat Jul 18", sortDate: new Date(2026, 6, 18), type: "group", text: "VOTER ACTION: Charlotte County neighbors, make sure your voice is heard! You can register online at https://registertovoteflorida.gov. Update your registration today!", instr: "Reply to every comment with a direct thank-you and ask commenters to tag one neighbor who may not be…", tip: "ACTION" },

            { id: 6, date: "Mon Jul 20", sortDate: new Date(2026, 6, 20), type: "group", text: "VOTER REGISTRATION: Are you registered to vote for the November 3 election? Florida's deadline is October 5 — don't wait. It takes less than 5 minutes: https://registertovoteflorida.gov. Share this with a neighbor who might not be registered! 👇", instr: "Ask every commenter to tag one unregistered neighbor — that's how this spreads.", tip: "REGISTER" },
            { id: 7, date: "Tue Jul 21", sortDate: new Date(2026, 6, 21), type: "group", text: "CAMPAIGN EVENTS MASTER LIST:\n📅 July 23: Englewood Meet & Greet (5:30 PM)\n📅 July 30: Medicare Anniversary (11:00 AM)\n📅 Sept 12: Great Blue Round Up (4:00 PM)", instr: "Pin this post to the top of your personal profile immediately, then share it to the campaign group so both…", tip: "PLANNER" },
            { id: 8, date: "Wed Jul 22", sortDate: new Date(2026, 6, 22), type: "group", text: "Homeowners insurance is sky-high in Charlotte County. We need leadership that prioritizes families over insurance companies.\n\nHas your premium gone up this year? How much? Share below — your story matters. ⬇️", instr: "Reply to every comment by name and save the stories shared here to reference in future policy posts.", tip: "POLICY" },
            { id: 9, date: "Thu Jul 23", sortDate: new Date(2026, 6, 23), type: "group", text: "MEET & GREET: Join me TONIGHT in Englewood! I want to hear your concerns and share my vision for our future.\n\n📍 Englewood Community Center | 5:30 PM\nDetails at votecynthiabutler.com\n\nWho's coming? Drop your name below and let's pack the room! 👇", venue: "Englewood Community Center", time: "5:30 PM", ndText: "Hi neighbors! I'm Cynthia Butler — a retired nurse running for FL House District 75.\n\nJoin me TONIGHT in Englewood — I want to hear YOUR concerns and what matters most to your family.\n\n📍 Englewood Community Center | 5:30 PM TONIGHT\n\nCome as you are. Bring a neighbor.\n\nWho's coming? Drop your name below! 👇", instr: "Post at 9 AM to capture the morning scroll, then reply to every comment asking who's coming and personally…", tip: "MEETUP" },
            { id: 10, date: "Fri Jul 24", sortDate: new Date(2026, 6, 24), type: "group", text: "I'm looking for 5 neighbors to join our canvassing team this weekend! Let's talk to our neighbors. Comment below if you can spare 2 hours!", instr: "Reply to every commenter within the hour to lock in their commitment before they move on.", tip: "RECRUIT" },
            { id: 13, date: "Wed Jul 29", sortDate: new Date(2026, 6, 29), type: "group", text: "MEDICARE’S 61ST BIRTHDAY IS TOMORROW — July 30 is the exact anniversary of the day President Johnson signed Medicare into law in 1965.\n\nWe’re marking it where it matters most: at Rep. Greg Steube’s office. He has voted against expanding Medicare while his own healthcare is taxpayer-funded. So we’re bringing birthday cards and balloons — because constituents deserve a seat at his desk.\n\n🎈 Write why Medicare matters to YOUR family inside your card. That message goes on record.\n\nWe’re also delivering an open letter from 350 national organizations demanding he protect Medicare.\n\n📍 226 Taylor St, Punta Gorda | 11:00 AM\nJoin us — bring a card, a balloon with a Medicare for All message — bold and visible — and a neighbor. votecynthiabutler.com\n\nCan you make it? Drop a ✋ below!", venue: "Office of Rep. Greg Steube — 226 Taylor St, Punta Gorda", time: "11:00 AM", instr: "Bring balloons with Medicare for All messages — bold, visible, birthday-themed. Reshare tomorrow morning.", tip: "BDAY ACTION" },

            { id: 19, date: "Wed Sep 9", sortDate: new Date(2026, 8, 9), type: "group", text: "COUNTDOWN: Just 3 days until the Great Blue Round Up at Wings and Rings! Get your tickets and join the rally for our future. Tickets and info at votecynthiabutler.com", venue: "Wings and Rings, Port Charlotte", time: "4:00 PM", instr: "Reply to every comment with a direct invitation and personally message supporters who haven't said they're…", tip: "RALLY" },
            { id: 20, date: "Sat Sep 12", sortDate: new Date(2026, 8, 12), type: "group", text: "Be part of the energy. Be part of the movement.\n\nJoin us TONIGHT at the Great Blue Round Up at Wings and Rings — food, community, and a campaign ready to win in August 2026.\n\n🎟️ Details and RSVP: votecynthiabutler.com\n\nWho's coming tonight? Tag them below and let's pack the house! 👇", venue: "Wings and Rings, Port Charlotte", time: "4:00 PM", instr: "Reply to every comment asking who's coming, share to your personal timeline, and post a live update from…", tip: "VICTORY" },

            { id: 34, date: "Sun Jul 26", sortDate: new Date(2026, 6, 26), type: "group", text: "COMMUNITY POLL #1: What do you think is the BIGGEST obstacle facing Charlotte County families right now? A) Skyrocketing insurance costs, B) Healthcare access, C) Job wages not keeping up, D) Government accountability. Comment your letter below!", instr: "Reply to every single comment within the hour and tally the results to reference in a future policy post.", tip: "POLL" },
            { id: 23, date: "Mon Jul 27", sortDate: new Date(2026, 6, 27), type: "group", text: "POLICY SPOTLIGHT: Florida homeowners in Charlotte County pay some of the highest insurance premiums in the country. I will fight for real legislation that protects families — not insurance company profits.\n\nHave you considered leaving Florida because of insurance costs? You're not alone. Share your situation below — every story I read shapes what I fight for in Tallahassee. ⬇️ votecynthiabutler.com", instr: "Reply to every comment and tag neighbors or friends you know have been hit by rate increases to draw them…", tip: "POLICY" },
            { id: 24, date: "Tue Jul 28", sortDate: new Date(2026, 6, 28), type: "group", text: "Thank you to every volunteer, donor, and neighbor who has shown up for this campaign. We are building something real together. Your support means everything. — Cynthia\n\nTag someone below who has shown up for this community. Let's celebrate the people making this happen! 💙", instr: "Tag every volunteer and donor you can name in the comments after posting to notify them and pull their…", tip: "GRATITUDE" },

            { id: 26, date: "Sat Aug 1", sortDate: new Date(2026, 7, 1), type: "group", text: "August is HERE — and we have 94 days until Election Day! Every door knocked, every post shared, every conversation matters. Let's make this the best month yet for District 75. Who's with me? Visit votecynthiabutler.com", instr: "Share to your personal timeline and reply to every comment, asking each person what one thing they'll do this ", tip: "MOMENTUM" },
            { id: 27, date: "Sun Aug 2", sortDate: new Date(2026, 7, 2), type: "group", text: "A neighbor recently told me she skips her blood pressure medication every other day to afford groceries. That is NOT acceptable in Charlotte County. I am running to make healthcare accessible for every family. Share your story below.", instr: "Reply to every comment by name and ask follow-up questions to keep the thread active through the day.", tip: "STORY" },
            { id: 48, date: "Sun Aug 2", sortDate: new Date(2026, 7, 2), type: "group", text: "COMMUNITY POLL #2: What healthcare change would most improve your family's life? A) Lower prescription drug costs, B) Affordable health insurance, C) More local doctors/specialists, D) Mental health access. Comment below — your answer shapes our platform!", instr: "Reply to every comment within the hour and tally results to share in a follow-up post this week.", tip: "POLL" },
            { id: 28, date: "Mon Aug 3", sortDate: new Date(2026, 7, 3), type: "group", text: "CORPORATE TRANSPARENCY: Florida families deserve to know when corporations are influencing their state legislature. I will fight for full disclosure laws so you always know who is speaking for you — and who is speaking for special interests.\n\nShare this if you believe government should be transparent. And tell us: what issue do you most want accountability on? ⬇️ votecynthiabutler.com", instr: "Reply to every comment and ask commenters to tag someone who also wants accountability in government.", tip: "POLICY" },

            { id: 31, date: "Thu Aug 6", sortDate: new Date(2026, 7, 6), type: "group", text: "A career as a retired nurse taught me that listening is the most powerful tool we have. That's why I'm knocking on doors, attending community meetings, and reading every message you send.\n\nTell me what's on your mind — I'm listening. Drop it in the comments. ⬇️ votecynthiabutler.com", instr: "Respond to every comment in detail today so the engagement signals extend the post's reach in the algorithm.", tip: "PERSONAL" },
            { id: 32, date: "Fri Aug 7", sortDate: new Date(2026, 7, 7), type: "group", nd: 'group', text: "VOLUNTEER THIS WEEKEND: Join our canvassing crew Saturday morning in Port Charlotte! No experience needed — just a passion for your community. Sign up at votecynthiabutler.com or comment below.", tip: "RECRUIT", instr: "Pin it to the top of the group right after posting and personally message 5 people you know are free this…" },
            { id: 33, date: "Sat Aug 8", sortDate: new Date(2026, 7, 8), type: "group", text: "Door-knocking today in Englewood — and the conversations are incredible. Neighbors are fired up about healthcare costs, insurance rates, and wanting REAL representation.\n\nWhat issue fires YOU up most? Drop it below — I want to hear it straight from you. ⬇️ votecynthiabutler.com", instr: "After posting, tag every team member present so their friends see the campaign in action.", tip: "CANVASS" },
            { id: 35, date: "Mon Aug 10", sortDate: new Date(2026, 7, 10), type: "group", text: "SENIOR SPOTLIGHT: Florida seniors deserve dignity, not debt. I'm committed to protecting Medicare and Social Security — and fighting against ANY attempts to cut these critical programs. Tag a senior in your life who deserves better! votecynthiabutler.com", instr: "Share to your personal timeline, ask supporters to tag a senior in their life, and monitor comments to…", tip: "SENIORS" },
            { id: 36, date: "Tue Aug 11", sortDate: new Date(2026, 7, 11), type: "group", text: "Grateful for the incredible community members standing with our campaign. Your words of encouragement and trust keep me going every single day. Together, WE are the voice of District 75! Visit votecynthiabutler.com to join us.", instr: "Tag anyone whose support you can publicly name and reply to every comment to extend the post's engagement.", tip: "ENDORSE" },
            { id: 37, date: "Wed Aug 12", sortDate: new Date(2026, 7, 12), type: "group", text: "Did you know Charlotte County homeowners pay an average of $4,800/year for home insurance — nearly double the national average? This is a CRISIS. I will prioritize affordable, fair insurance solutions on day one in Tallahassee. Share if you agree!", instr: "If budget allows, boost this post for $20 to reach Charlotte County homeowners beyond your current followers; ", tip: "POLICY" },
            { id: 38, date: "Thu Aug 13", sortDate: new Date(2026, 7, 13), type: "group", text: "Midweek motivation: Change doesn't happen overnight, but it DOES happen when enough people decide they won't accept the status quo. We're building that movement right here in District 75. Keep going, neighbors! votecynthiabutler.com", instr: "Share to your personal timeline and reply to every comment today to keep the energy alive.", tip: "MOTIVATE" },
            { id: 39, date: "Fri Aug 14", sortDate: new Date(2026, 7, 14), type: "group", nd: 'public', text: "VOTER REGISTRATION REMINDER: Make sure YOU are registered to vote! Florida's registration deadline for the November General Election is October 5. Don't wait — check your registration now at https://registertovoteflorida.gov", ndText: "Neighbor reminder — Florida's voter registration deadline for the November General Election is October 5. If you or anyone on your street isn't registered, now's the time.\n\nCheck or update your registration in 2 minutes: https://registertovoteflorida.gov\n\nAlready registered? Drop a ✅ so your neighbors know it's easy! 👇", instr: "Pin it to the top of the group, share to your personal timeline, and repost to Nextdoor so it reaches voters…", tip: "REGISTER" },

            { id: 42, date: "Mon Aug 17", sortDate: new Date(2026, 7, 17), type: "group", text: "EDUCATION MATTERS: Our kids deserve fully funded schools, well-paid teachers, and safe classrooms. I'm committed to fighting for education funding that reflects our community's values. What does your school need most? Tell me below!", instr: "After posting, tag any teachers or school board members you know and respond to every comment about specific…", tip: "EDUCATION" },
            { id: 43, date: "Tue Aug 18", sortDate: new Date(2026, 7, 18), type: "group", text: "Every great-grandmother should be able to look her great-grandchildren in the eye and say: 'I fought for your future.' That's exactly what I'm doing.\n\nTag someone in your life you're fighting for. Let's make history together. 💙 votecynthiabutler.com", instr: "Share to your personal timeline after posting, and reply to everyone who tags a family member they're…", tip: "PERSONAL" },

            { id: 50, date: "Tue Aug 25", sortDate: new Date(2026, 7, 25), type: "group", text: "I didn't run for office to make friends in Tallahassee. I ran because Charlotte County families are being priced out of their homes, their health, and their future — and SOMEONE has to stand up. I'm that someone. votecynthiabutler.com", instr: "Share to your personal timeline and reply to every commenter, especially anyone who expresses doubt, with a…", tip: "BOLD" },
            { id: 51, date: "Wed Aug 26", sortDate: new Date(2026, 7, 26), type: "group", text: "POLICY: Florida's corporate tax breaks need to be re-examined. While families struggle with rising costs, corporations are receiving hundreds of millions in state subsidies. I'll fight to redirect those resources to working families and small businesses. votecynthiabutler.com", instr: "Reply to every comment and ask people to share it if they know a small business owner who's felt squeezed.", tip: "POLICY" },
            { id: 52, date: "Thu Aug 27", sortDate: new Date(2026, 7, 27), type: "group", text: "VOLUNTEER SHOUTOUT: To every person who has knocked a door, made a call, shared a post, or donated — YOU are the backbone of this campaign. This is YOUR victory as much as mine. Thank you from the bottom of my heart.", instr: "Tag every volunteer you can name in the post or comments and send a personal thank-you message to anyone who…", tip: "GRATITUDE" },
            { id: 53, date: "Fri Aug 28", sortDate: new Date(2026, 7, 28), type: "group", nd: 'group', text: "WEEKEND PLANS: We have canvassing teams going out Saturday morning in Englewood and Sunday afternoon in Port Charlotte. Join us! Sign up at votecynthiabutler.com or comment below with your availability.", ndText: "Hi group members! I'm Cynthia Butler — a retired nurse running for FL House District 75.\n\nWe're heading out to knock doors this weekend — canvassing teams Saturday morning in Englewood and Sunday afternoon in Port Charlotte. Can you give 2–3 hours?\n\nSign up at votecynthiabutler.com or comment below with your availability and nearest area. Every door we knock together moves us closer to winning.\n\nWhich works for you — Saturday in Englewood or Sunday in Port Charlotte? ⬇️", instr: "Reply to every comment immediately with the specific time and meeting location for their nearest canvassing…", tip: "WEEKEND" },
            { id: 54, date: "Sat Aug 29", sortDate: new Date(2026, 7, 29), type: "group", text: "Final weekend of August — and this campaign has never been stronger. We've spoken with thousands of neighbors. The momentum is REAL. Let's close out this month strong! Visit votecynthiabutler.com to join the movement.", instr: "Post before 9 AM, share to your personal timeline, and reply to every comment with a forward-looking ask…", tip: "MOMENTUM" },
            { id: 55, date: "Sun Aug 30", sortDate: new Date(2026, 7, 30), type: "group", text: "September is coming — and so is the final stretch! In the weeks ahead, we'll be hosting more events, knocking more doors, and growing stronger every day. Follow votecynthiabutler.com for updates. Mark your calendar: November 3 is Election Day!", instr: "Reply to every comment and personally invite any engaged commenter to attend the September 12 rally.", tip: "PREVIEW" },
            { id: 56, date: "Mon Aug 31", sortDate: new Date(2026, 7, 31), type: "group", text: "Tomorrow is Labor Day — a holiday that reminds us why workers' rights, fair wages, and dignity on the job matter. As your representative, I will NEVER forget who I work for: the hardworking families of District 75. votecynthiabutler.com", instr: "Post between 7–9 PM and share to your personal timeline so it lands in the evening scroll.", tip: "HOLIDAY" },

            // ── SEPTEMBER (filling gaps around existing posts) ──
            { id: 57, date: "Tue Sep 1", sortDate: new Date(2026, 8, 1), type: "group", text: "HAPPY LABOR DAY, District 75! Today we honor the workers who built this country — nurses, teachers, tradespeople, service workers. You deserve representatives who fight for fair wages, safe workplaces, and affordable healthcare. That's MY promise. votecynthiabutler.com", instr: "Post at 8 AM when people are checking phones before Labor Day activities, then share to your personal…", tip: "LABOR DAY" },
            { id: 58, date: "Wed Sep 2", sortDate: new Date(2026, 8, 2), type: "group", text: "Post-Labor Day reality check: 62 days until Election Day. The next 9 weeks will define our future. Are you IN? Visit votecynthiabutler.com to volunteer, donate, or request a yard sign!", instr: "Share to your personal timeline and direct everyone to the website volunteer sign-up link in your reply to…", tip: "COUNTDOWN" },
            { id: 59, date: "Thu Sep 3", sortDate: new Date(2026, 8, 3), type: "group", text: "WORKING FAMILIES FIRST: Florida's minimum wage is not keeping pace with the cost of living in Charlotte County. I support policies that ensure full-time workers can afford to live in the community they serve. What's your experience? Comment below.", instr: "Reply to every comment about specific jobs or wages and share to your personal timeline to reach workers…", tip: "WORKERS" },
            { id: 60, date: "Fri Sep 4", sortDate: new Date(2026, 8, 4), type: "group", text: "TWO MONTHS OUT: November 3rd is exactly 2 months away. Here's how you can help RIGHT NOW: Confirm your voter registration. Request vote-by-mail. Share this page with 5 friends. Every action counts. votecynthiabutler.com", instr: "Share to your personal timeline and reply to every commenter who completes a step to publicly celebrate them…", tip: "ACTION" },
            { id: 61, date: "Sat Sep 5", sortDate: new Date(2026, 8, 5), type: "group", text: "CANVASSING SATURDAY! Our teams are out in Charlotte County today talking to neighbors about the issues that matter most. Want to come out next time? Sign up at votecynthiabutler.com — no experience needed, just enthusiasm!", instr: "Tag every volunteer on the team so their personal networks see the campaign in action and feel the pull to…", tip: "CANVASS" },
            { id: 62, date: "Sun Sep 6", sortDate: new Date(2026, 8, 6), type: "group", text: "Sunday thought: Community isn't built in Tallahassee — it's built right here, neighbor by neighbor. That's why this campaign is run by the people, for the people. What does community mean to YOU? Share below. votecynthiabutler.com", instr: "Reply to every answer with a personal follow-up so commenters feel heard and return to the page throughout…", tip: "COMMUNITY" },
            { id: 63, date: "Mon Sep 7", sortDate: new Date(2026, 8, 7), type: "group", text: "VOTER REGISTRATION ALERT: Florida's registration deadline is October 5 — just 28 days away. Help us make sure every neighbor in District 75 is registered! Share this post and direct friends to https://registertovoteflorida.gov", instr: "Share this post to your personal timeline and ask commenters to forward it to one specific person they know…", tip: "REGISTER" },
            { id: 64, date: "Tue Sep 8", sortDate: new Date(2026, 8, 8), type: "group", text: "Getting EXCITED for our Great Blue Round Up on September 12 at Wings and Rings in Port Charlotte! This is going to be an amazing night of community, energy, and vision for District 75. Grab your tickets at votecynthiabutler.com — don't miss it!", instr: "Reply to every comment with a personal invitation, ask each commenter to bring one person, and share to your…", tip: "RALLY" },
            { id: 65, date: "Thu Sep 10", sortDate: new Date(2026, 8, 10), type: "group", nd: 'group', text: "TOMORROW is the Great Blue Round Up! If you haven't grabbed your ticket yet, there's still time. Come celebrate our movement, meet your neighbors, and let's show Charlotte County what people power looks like. Details at votecynthiabutler.com", instr: "Post at noon and again at 6 PM, and reply to every comment with the venue address and a direct ask for them…", tip: "RALLY" },
            { id: 66, date: "Fri Sep 11", sortDate: new Date(2026, 8, 11), type: "both", text: "On this day of remembrance, we honor the courage of those who ran toward danger to save others. As a retired nurse, I understand that call to serve. We serve our community not just in crisis — but every day, at the ballot box and in public office. Never Forget.", instr: "Use an American flag image only, no campaign graphics; reply to every comment simply and personally.", tip: "MEMORIAL" },
            { id: 67, date: "Sun Sep 13", sortDate: new Date(2026, 8, 13), type: "group", text: "WOW. Last night's Great Blue Round Up was ELECTRIC! Thank you to every neighbor who came out, every volunteer who made it happen, and every heart that beats for District 75. The movement is ALIVE. Share your photos from last night! votecynthiabutler.com", instr: "Tag every attendee you can identify in the photos, ask supporters to share their own photos in the comments,…", tip: "RECAP" },
            { id: 68, date: "Mon Sep 14", sortDate: new Date(2026, 8, 14), type: "group", text: "Coming off the energy of our Great Blue Round Up — and I am MORE motivated than ever. 50 days until Election Day. Let's channel that energy into action: volunteer, donate, share. All at votecynthiabutler.com", instr: "Share to your personal timeline and reply to every commenter with one specific volunteer opportunity they can ", tip: "MOMENTUM" },
            { id: 69, date: "Tue Sep 15", sortDate: new Date(2026, 8, 15), type: "group", text: "HEALTHCARE FACT: Florida has one of the highest rates of uninsured residents in the nation. That's not a statistic — those are our neighbors. I'll fight for Medicaid expansion and accessible community health centers in District 75.\n\nDo you know someone who can't afford health insurance right now? Share this post for them. And if you have a story, share it below — lawmakers need to hear real voices. ⬇️ votecynthiabutler.com", instr: "Tag any healthcare workers or clinic staff you know in the comments and reply to every story shared below…", tip: "HEALTH" },
            { id: 70, date: "Wed Sep 16", sortDate: new Date(2026, 8, 16), type: "group", text: "VOLUNTEER SPOTLIGHT: This campaign runs on the energy of incredible people showing up for their community. If you've volunteered with us — THANK YOU.\n\nIf you haven't yet, there's still time — and we NEED you! Tag someone below who should join our team. 💙 Sign up at votecynthiabutler.com", instr: "Feature a specific volunteer's story or quote if you have one, tag them so their friends see the post, and…", tip: "VOLUNTEER" },
            { id: 71, date: "Thu Sep 17", sortDate: new Date(2026, 8, 17), type: "group", nd: 'group', text: "Happy Constitution Day! Today we celebrate the founding document that guarantees your right to vote. Exercise that right on November 3 — and make sure your neighbors do too. Verify your registration at https://registertovoteflorida.gov", instr: "Share to your personal timeline and reply to every comment with the registration link.", tip: "CIVIC" },
            { id: 72, date: "Fri Sep 18", sortDate: new Date(2026, 8, 18), type: "group", text: "46 days until Election Day! Here's your Friday action list: Share our Facebook page. Text a neighbor about votecynthiabutler.com. Ask if your household is registered to vote. Small actions = BIG results!", instr: "Share to your personal timeline after posting and check back Saturday morning to publicly thank everyone who…", tip: "ACTION" },
            { id: 73, date: "Sat Sep 19", sortDate: new Date(2026, 8, 19), type: "group", text: "CANVASSING DAY! Our teams are covering Port Charlotte, Englewood, and Punta Gorda today. The conversations are incredible — people are READY for change. Want to join us? Visit votecynthiabutler.com to find the next event near you!", instr: "Tag team members as photos are taken and post a follow-up update with a volunteer count by end of day.", tip: "CANVASS" },
            { id: 74, date: "Sun Sep 20", sortDate: new Date(2026, 8, 20), type: "group", text: "A neighbor asked me: 'Cynthia, do you really think you can make a difference?' My answer: I already am — because YOU are with me. Every conversation, every vote, every shared post is the difference.\n\nWhat's YOUR 'why' for supporting this campaign? Share it below — your words inspire people who are still on the fence. ⬇️ votecynthiabutler.com", instr: "Reply to every answer with a specific, personal response so commenters feel genuinely heard.", tip: "STORY" },
            { id: 75, date: "Mon Sep 21", sortDate: new Date(2026, 8, 21), type: "group", text: "SENIORS & MEDICARE: Any politician who threatens to cut, privatize, or reduce Social Security and Medicare benefits is threatening YOUR retirement. I will be an unapologetic defender of these programs in Tallahassee. Share if you stand with our seniors!", instr: "Share to your personal timeline immediately and ask commenters to tag a senior or retiree they care about.", tip: "SENIORS" },
            { id: 76, date: "Tue Sep 22", sortDate: new Date(2026, 8, 22), type: "group", text: "First day of autumn! As the season changes, so does the intensity of this campaign. We are entering the HOME STRETCH. Are you ready? Join our final push at votecynthiabutler.com — there's a role for everyone.", instr: "Share to your personal timeline and reply to every comment by pointing each person to one specific role on…", tip: "SEASONAL" },
            { id: 77, date: "Wed Sep 23", sortDate: new Date(2026, 8, 23), type: "group", text: "REGISTER NOW: Florida's voter registration deadline is just 12 days away — October 5! Don't let anything stop you from having your say on November 3. Check your registration at https://registertovoteflorida.gov and share this with every neighbor!", instr: "Pin this to the top of the group after posting, share to your personal timeline, and ask commenters to share…", tip: "REGISTER" },
            { id: 78, date: "Thu Sep 24", sortDate: new Date(2026, 8, 24), type: "group", text: "Why does your vote matter? Because in recent Florida House races, seats have been decided by fewer than 500 votes. YOUR voice is the difference between representation that fights for you — or legislation that ignores you. Vote November 3. votecynthiabutler.com", instr: "Share to your personal timeline and reply to every comment, especially from people who say they're not sure…", tip: "VOTE" },
            { id: 79, date: "Fri Sep 25", sortDate: new Date(2026, 8, 25), type: "group", nd: 'group', text: "WEEKEND PLANS: Canvassing teams hit the doors Saturday at 9 AM sharp!\n\nBring water, wear comfortable shoes, and bring your enthusiasm — every door matters in District 75.\n\n👉 RSVP: votecynthiabutler.com\n\nComment below if you're coming — and tag a friend who should join you! The more the merrier. 💪", instr: "Reply to every comment with the exact meet-up time and location, and personally message your most active…", tip: "CANVASS" },
            { id: 80, date: "Sat Sep 26", sortDate: new Date(2026, 8, 26), type: "group", text: "Out knocking doors in District 75 today! This is how campaigns are won — one conversation at a time. Want to walk with us? Visit votecynthiabutler.com to join the canvassing team. 💙", instr: "Post with a photo from the doors, share to your personal timeline, and reply to every comment inviting them…", tip: "CANVASS" },
            { id: 81, date: "Sun Sep 27", sortDate: new Date(2026, 8, 27), type: "group", text: "COMMUNITY SPOTLIGHT: This campaign belongs to every person in District 75 who believes we deserve better. Tell us YOUR story — what brought you to support Cynthia's campaign? Share in the comments. We love hearing from our community! votecynthiabutler.com", instr: "Reply to every testimonial with a specific personal thank-you and ask each person to share their comment as a ", tip: "COMMUNITY" },

            { id: 83, date: "Tue Sep 29", sortDate: new Date(2026, 8, 29), type: "group", text: "VOTER REGISTRATION DEADLINE: October 5 is ONE WEEK AWAY! If you or anyone you know is not registered to vote in Florida, the time to act is NOW. Register at https://registertovoteflorida.gov — it takes less than 5 minutes!", instr: "Pin it to the top of the group immediately, share to your personal timeline, and ask every commenter to…", tip: "DEADLINE" },
            { id: 84, date: "Wed Sep 30", sortDate: new Date(2026, 8, 30), type: "group", text: "Last day of September — and we are READY for October. This campaign has come so far because of this incredible community. 34 days until Election Day. Let's finish what we started. votecynthiabutler.com", instr: "Share to your personal timeline, reply to every comment with gratitude, and use each response to point people ", tip: "MILESTONE" },

            { id: 85, date: "Thu Oct 1", sortDate: new Date(2026, 9, 1), type: "group", nd: 'group', text: "OCTOBER KICKOFF! 33 days until we make history in District 75. Register to vote by October 5. Request your Vote-by-Mail ballot. Sign up to phone bank. Join a canvassing team. ALL at votecynthiabutler.com", instr: "Pin to the top of the group immediately after posting and reply to every comment by asking which action…", tip: "LAUNCH" },

            { id: 92, date: "Thu Oct 8", sortDate: new Date(2026, 9, 8), type: "group", text: "ECONOMY & FAMILIES: Working families in Charlotte County deserve a livable wage, affordable childcare, and economic stability. I'll fight against policies that benefit corporations at the expense of the workers who keep this county running. votecynthiabutler.com", instr: "Share to your personal timeline and reply to every comment about a specific financial pressure with a policy…", tip: "ECONOMY" },
            { id: 93, date: "Fri Oct 9", sortDate: new Date(2026, 9, 9), type: "group", text: "Friday push — 25 days left! This weekend, challenge yourself: Have ONE conversation with a neighbor about the November election. You don't need to be an expert — just share why YOU are voting for Cynthia. That's all it takes. votecynthiabutler.com", instr: "Reply to every commenter who says they'll do it with a suggested script or talking point they can use.", tip: "GOTV" },
            { id: 94, date: "Sat Oct 10", sortDate: new Date(2026, 9, 10), type: "group", text: "CANVASSING TODAY! We have teams covering Port Charlotte and Englewood. Come join us — t-shirts provided, snacks available, great energy guaranteed. Let's get out the vote! RSVP at votecynthiabutler.com", instr: "Tag every volunteer who shows up and post a midday energy update from the field to recruit any late arrivals.", tip: "CANVASS" },
            { id: 95, date: "Sun Oct 11", sortDate: new Date(2026, 9, 11), type: "group", text: "Sunday message: Whatever your background, whatever your story — you deserve a representative who listens. I grew up in this community. I nursed your neighbors back to health. I am ONE OF YOU. Vote Cynthia Butler on November 3. votecynthiabutler.com", instr: "Share to your personal timeline and reply to every comment, especially from anyone who says they're still…", tip: "AUTHENTIC" },
            { id: 96, date: "Mon Oct 12", sortDate: new Date(2026, 9, 12), type: "group", text: "HEALTHCARE ACCESS: 1 in 8 Charlotte County residents lacks health insurance. Those are our teachers, our service workers, our neighbors. I'm committed to expanding access to affordable care so NO ONE has to choose between medicine and groceries.\n\nShare this if you believe healthcare is a right, not a privilege. And tell us: what would affordable healthcare mean for YOUR family? ⬇️ votecynthiabutler.com", instr: "Share to your personal timeline and reply to every commenter who shares a story or a name with a direct…", tip: "HEALTH" },
            { id: 97, date: "Tue Oct 13", sortDate: new Date(2026, 9, 13), type: "group", text: "THREE WEEKS until Election Day! Confirm your registration. Request your Vote-by-Mail ballot. Sign up to volunteer. Donate if you can. All at votecynthiabutler.com — let's close this strong!", instr: "Pin to the top of the group, share to your personal timeline, and reply to each commenter asking which step…", tip: "COUNTDOWN" },
            { id: 98, date: "Wed Oct 14", sortDate: new Date(2026, 9, 14), type: "group", text: "VOTE BY MAIL REMINDER: If you requested a mail-in ballot, it should arrive soon. When it does: Open it carefully. Follow ALL instructions. Return it ASAP — don't wait until the last minute! Questions? Visit votecynthiabutler.com", instr: "Share to your personal timeline and reply to every question in the comments with a clear, direct answer.", tip: "VBM" },
            { id: 99, date: "Thu Oct 15", sortDate: new Date(2026, 9, 15), type: "group", text: "VOLUNTEER APPRECIATION: To everyone who has given their time to this campaign — I see you, I appreciate you, and I will NEVER forget the sacrifices you've made to build something better for District 75. You are my heroes.", instr: "Tag as many volunteers as possible in the comments, send personal messages to your three most active team…", tip: "GRATITUDE" },
            { id: 100, date: "Fri Oct 16", sortDate: new Date(2026, 9, 16), type: "group", nd: 'group', text: "THIS WEEKEND: Final major canvassing push before early voting begins! We need all hands on deck. Shifts available Saturday and Sunday. Sign up at votecynthiabutler.com or comment below.", instr: "Reply to every comment immediately with the shift time, pin the post to the top of the group, and personally…", tip: "CANVASS" },
            { id: 101, date: "Sat Oct 17", sortDate: new Date(2026, 9, 17), type: "group", text: "Out knocking doors today and the energy is INCREDIBLE. People are fired up. People are ready. People are VOTING CYNTHIA BUTLER on November 3. Can you feel the momentum? Share this and let's keep it going! votecynthiabutler.com", instr: "Share to your personal timeline, post a short video clip if you have one, and reply to every comment by…", tip: "MOMENTUM" },
            { id: 102, date: "Sun Oct 18", sortDate: new Date(2026, 9, 18), type: "group", text: "VOTE BY MAIL: Florida requires mail-in ballots to be RECEIVED by 7 PM on November 3 — not just postmarked. If you have a mail ballot, return it this week to be safe. Drop off at the Charlotte County SOE: https://www.soecharlottecountyfl.gov", instr: "Share to your personal timeline, pin to the group, and reply to every comment confirming the drop-off address ", tip: "VBM" },
            { id: 103, date: "Mon Oct 19", sortDate: new Date(2026, 9, 19), type: "group", text: "POLICY SPOTLIGHT: As your State Representative, I will push for a statewide review of the homeowners insurance market — demanding rate transparency and accountability from every insurer doing business in Florida. Your home matters. votecynthiabutler.com", instr: "Share to your personal timeline and reply to every comment by connecting the commenter's personal insurance…", tip: "POLICY" },

const fullMonths = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let lastMonth = -1, lastDate = '';
const tbody = document.getElementById('tbody');


function getPostTime(p) {
  const day = new Date(p.sortDate).getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  if (p.type === 'event') return '7:00 AM';
  if (p.id === 56 || p.id === 107) return '7:00 PM';
  if (day === 0) return '10:00 AM';  // Sun — soft reach
  if (day === 6) return '9:00 AM';   // Sat — 8–10 AM window
  if (day === 1) return '12:00 PM';  // Mon — 12–1 PM window
  if (day === 5) return '10:00 AM';  // Fri — 10 AM–12 PM window
  return '9:00 AM';                  // Tue/Wed/Thu — FB 9 AM–12 PM prime
}

function getTimeDisplay(p) {
  const day = new Date(p.sortDate).getDay();
  const t = getPostTime(p);
  if (!p.nd) return t;
  const onThurFri = day === 4 || day === 5;
  const ndNote = onThurFri ? 'ND: 5–7 PM' : 'ND → Thu/Fri 5–7 PM';
  return t + '<br><span style="color:#10b981;font-size:8px;font-weight:700">' + ndNote + '</span>';
}

allPosts.forEach(function(p) {
  const d = new Date(p.sortDate);
  const mo = d.getMonth();

  if (mo !== lastMonth) {
    const mr = document.createElement('tr');
    mr.className = 'month-row';
    mr.innerHTML = '<td colspan="5">' + fullMonths[mo] + ' ' + d.getFullYear() + '</td>';
    tbody.appendChild(mr);
    lastMonth = mo;
  }

  const badges = [];
  if (p.nd === 'public')  badges.push('<span class="badge b-ndp">ND Public</span>');
  if (p.nd === 'group')   badges.push('<span class="badge b-ndg">ND Group</span>');
  if (p.type === 'event' || p.type === 'both') {
    badges.push('<span class="badge b-fbp">FB Personal</span>');
    badges.push('<span class="badge b-fbg">FB Group</span>');
  } else if (p.type === 'personal') {
    badges.push('<span class="badge b-fbp">FB Personal</span>');
  } else {
    badges.push('<span class="badge b-fbg">FB Group</span>');
  }

  const sameDate = p.date === lastDate;
  lastDate = p.date;
  const first = (p.text.split('\n')[0] || '').replace(/</g,'&lt;').substring(0,75);

  const row = document.createElement('tr');
  row.className = 'row-' + p.type;
  row.innerHTML =
    '<td class="td-date' + (sameDate ? ' repeat' : '') + '">' + (sameDate ? '·' : p.date) + '</td>' +
    '<td style="font-size:9px;font-weight:700;color:#4a5568">' + getTimeDisplay(p) + '</td>' +
    '<td><span class="tip">' + (p.tip || '—') + '</span></td>' +
    '<td class="td-text">' + first + '</td>' +
    '<td><div class="badges">' + badges.join('') + '</div></td>';
  tbody.appendChild(row);
});

document.getElementById('subtitle').textContent += ' · ' + allPosts.length + ' posts';
</script>
